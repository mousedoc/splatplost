name: Build Windows executables

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install application and build tools
        run: python -m pip install --upgrade ".[build]"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build splatplan.exe
        run: >-
          pyinstaller --noconfirm --clean --onefile
          --name splatplan
          packaging/splatplan_entry.py

      - name: Build splatplot.exe
        run: >-
          pyinstaller --noconfirm --clean --onefile
          --name splatplot
          --hidden-import libnxctrl.splatplost_USB
          --hidden-import libnxctrl.rpc
          --hidden-import serial.tools.list_ports
          packaging/splatplot_entry.py

      - name: Smoke-test executables
        shell: pwsh
        run: |
          .\dist\splatplan.exe --version
          .\dist\splatplot.exe --help
          .\dist\splatplot.exe --list-ports

      - name: Create release archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item dist\splatplan.exe, dist\splatplot.exe, readme.md, LICENSE package
          Compress-Archive -Path package\* -DestinationPath splatplost-windows-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: splatplost-windows-x64
          path: splatplost-windows-x64.zip
          if-no-files-found: error
          retention-days: 90
